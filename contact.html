<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="/style.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-[#0A192F]">
    <div class="header-container fixed w-full bg-[#0A192F]">
      <header
        class="max-w-[1280px] m-auto flex justify-between items-center py-[15px]"
      >
        <span id="logo" class="text-white fira text-[20px] pl-[8px]"
          >Mirshohid</span
        >
        <nav class="nav" id="nav">
          <button id="ochilish" class="hidden max-[765px]:block">
            <i class="bx bx-x text-white text-[35px]"></i>
          </button>
          <ul class="flex items-center gap-[25px]">
            <li>
              <a href="#about" class="text-white urbanist text-[16px]">About</a>
            </li>
            <li>
              <a href="#experience" class="text-white urbanist text-[16px]"
                >Experience</a
              >
            </li>
            <li>
              <a href="#work" class="text-white urbanist text-[16px]">Work</a>
            </li>
            <li>
              <a href="#contact" class="text-white urbanist text-[16px]"
                >Contact</a
              >
            </li>
            <button
              class="border-[#64FFDA] border-[2px] rounded-[6px] text-white py-[6px] px-[10px]"
            >
              Resume
            </button>
          </ul>
        </nav>
        <button class="hidden max-[765px]:block" id="burgerbtn">
          <i class="bx bx-menu text-white text-[35px]"></i>
        </button>
      </header>
    </div>
 <div class="pt-[120px]">
     <form
  class="w-full max-w-[860px] m-auto  p-6 md:p-10 bg-[#112240] rounded-2xl shadow-lg  border border-[#1E2D3D]  "
>
  <h2 class="text-center text-[#64FFDA] text-2xl font-semibold">
    Contact Me
  </h2>

  <!-- NAME + SURNAME -->
  <div class="flex flex-col md:flex-row gap-4">
    <input
      type="text"
      id="name"
      required
      placeholder="Enter Your Name"
      class="w-full p-3 rounded-lg bg-[#0A192F] border border-[#233554] text-white placeholder-gray-400 focus:outline-none focus:border-[#64FFDA] transition"
    />

    <input
      type="text"
      id="surname"
      required
      placeholder="Enter Your Surname"
      class="w-full p-3 rounded-lg bg-[#0A192F] border border-[#233554] text-white placeholder-gray-400 focus:outline-none focus:border-[#64FFDA] transition"
    />
  </div>

  <!-- EMAIL -->
  <input
    type="email"
    id="email"
    required
    placeholder="Enter Your Email"
    class="w-full p-3 rounded-lg bg-[#0A192F] border border-[#233554] text-white placeholder-gray-400 focus:outline-none focus:border-[#64FFDA] transition"
  />

  <!-- MESSAGE -->
  <textarea
    id="message"
    required
    rows="5"
    placeholder="Enter Your Message"
    class="w-full p-3 rounded-lg bg-[#0A192F] border border-[#233554] text-white placeholder-gray-400 focus:outline-none focus:border-[#64FFDA] transition resize-none"
  ></textarea>

  <!-- BUTTON -->
  <button
    id="sendBtn"
    class="w-full py-3 bg-[#64FFDA] text-black font-semibold rounded-lg hover:bg-[#52e0c4] hover:scale-[1.02] active:scale-[0.98] transition"
  >
    Send Message
  </button>
</form>
 </div>
    <script src="/app.js"></script>
  </body>
</html>
